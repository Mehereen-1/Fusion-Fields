<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jungle Tactics - Game Board</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Using Fredoka One for that chunky, bubbly game title feel */
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap');

        :root {
            --jungle-dark: #1a2e05;
            --jungle-wood: #5d3a1a;
            --jungle-gold: #ffde59;
            --panel-bg: rgba(45, 27, 13, 0.75);
            --panel-glow: rgba(255, 222, 89, 0.15);
            --cell-frame: #b37a4d;
            --cell-bg: rgba(77, 46, 17, 0.9);
        }

        body {
            font-family: 'Fredoka', sans-serif;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://images.unsplash.com/photo-1542273917363-3b1817f69a2d?auto=format&fit=crop&q=80&w=2000') center/cover no-repeat;
            color: #fff;
            overflow: hidden;
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
        }

        /* Transparent & Glowy Side Panels */
        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(8px);
            border: 3px solid #5d3a1a;
            border-radius: 2rem;
            box-shadow: 
                0 10px 30px rgba(0,0,0,0.5),
                inset 0 0 20px var(--panel-glow);
            position: relative;
            overflow: hidden;
        }

        .glass-panel::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 50%;
            background: linear-gradient(to bottom, rgba(255,255,255,0.05), transparent);
            pointer-events: none;
        }

        .wood-inset {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 1.2rem;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* Updated individual cell design */
        .grid-cell {
            aspect-ratio: 1 / 1;
            background: var(--cell-bg);
            border: 4px solid var(--cell-frame);
            border-bottom-width: 8px;
            border-radius: 22px;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: 0 8px 16px rgba(0,0,0,0.6);
        }

        .grid-cell:hover {
            filter: brightness(1.2) saturate(1.2);
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 15px 25px rgba(0,0,0,0.7);
        }

        .dot {
            width: 18px;
            height: 18px;
            background: radial-gradient(circle at 30% 30%, #fff, #ffde59, #eab308);
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(255, 222, 89, 0.9), inset 0 -2px 4px rgba(0,0,0,0.4);
            margin: 2px;
        }

        /* Nav Buttons matching the yellow bubble style */
        .nav-button {
            background: linear-gradient(to bottom, #ffe67e, #facc15);
            border: 3px solid #713f12;
            border-radius: 20px;
            padding: 6px 20px;
            font-weight: 700;
            color: #452a10;
            text-transform: uppercase;
            box-shadow: 0 4px 0 #713f12;
            text-shadow: 0 1px 0 rgba(255,255,255,0.4);
        }

        .nav-button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #713f12;
        }

        .header-text {
            color: var(--jungle-gold);
            text-shadow: 2px 2px 0px #452a10;
            letter-spacing: 1px;
        }

        .stat-label {
            color: #ffe67e;
            font-weight: 700;
            font-size: 0.75rem;
            text-transform: uppercase;
        }

        /* Background Leaves */
        .leaf {
            position: absolute;
            z-index: -1;
            opacity: 0.6;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5));
            pointer-events: none;
        }

    </style>
</head>
<body class="p-4">

    <!-- Navbar -->
    <nav class="glass-panel w-full h-20 mb-4 flex items-center justify-between px-8 flex-shrink-0">
        <div class="flex items-center gap-4">
            <div class="bg-yellow-400 rounded-full p-2 border-4 border-yellow-700 shadow-lg">
                <i data-lucide="crown" class="w-6 h-6 text-yellow-900"></i>
            </div>
            <h1 class="text-2xl font-bold header-text">MONKEY SHOP</h1>
        </div>

        <div class="flex items-center gap-6">
            <div class="wood-inset px-5 py-2 flex items-center gap-3">
                <div class="w-6 h-6 bg-yellow-400 rounded-full flex items-center justify-center border-2 border-yellow-800">
                     <span class="text-[10px] text-yellow-900 font-bold">$</span>
                </div>
                <span class="font-bold text-lg text-yellow-50">2,450</span>
            </div>
            <button class="nav-button">CRATE</button>
            <div class="bg-red-500 rounded-full w-12 h-12 border-4 border-yellow-600 flex items-center justify-center cursor-pointer hover:rotate-45 transition-transform shadow-lg">
                <i data-lucide="menu" class="w-6 h-6 text-white"></i>
            </div>
        </div>
    </nav>

    <div class="flex flex-1 gap-6 overflow-hidden">
        <!-- Sidebar Left -->
        <aside class="glass-panel w-64 p-5 flex flex-col gap-5">
            <span class="stat-label text-center">Status</span>
            
            <div class="wood-inset p-5 flex flex-col items-center gap-3">
                <div class="relative">
                    <div class="w-24 h-24 bg-green-800 rounded-3xl border-4 border-yellow-600 flex items-center justify-center overflow-hidden rotate-3 shadow-xl">
                       <i data-lucide="smile" class="w-14 h-14 text-yellow-400 -rotate-3"></i>
                    </div>
                    <div class="absolute -bottom-2 -right-2 bg-yellow-400 text-yellow-900 px-2 py-0.5 rounded-full text-[10px] font-bold border-2 border-yellow-800">LVL 14</div>
                </div>
                <span class="font-bold text-xl header-text">THE CHIEF</span>
            </div>

            <div class="flex flex-col gap-3">
                <div>
                    <div class="flex justify-between items-center mb-1">
                        <span class="stat-label">EXP</span>
                        <span class="text-xs font-bold text-yellow-400">72%</span>
                    </div>
                    <div class="w-full bg-black/50 h-4 rounded-full p-0.5 border border-white/10">
                        <div class="bg-gradient-to-r from-green-500 to-green-300 h-full rounded-full shadow-[0_0_10px_#4ade80]"></div>
                    </div>
                </div>

                <div class="flex flex-col gap-1 mt-2">
                    <div class="flex items-center gap-2 text-sm">
                        <i data-lucide="check-circle" class="w-4 h-4 text-green-400"></i>
                        <span class="text-yellow-100/80">3% MONDE</span>
                    </div>
                    <div class="flex items-center gap-2 text-sm">
                        <i data-lucide="check-circle" class="w-4 h-4 text-green-400"></i>
                        <span class="text-yellow-100/80">WAN NUSENT</span>
                    </div>
                </div>
            </div>

            <div class="mt-auto">
                <button class="w-full bg-red-600/80 hover:bg-red-500 border-b-4 border-red-950 py-4 rounded-2xl font-bold text-white shadow-lg transition-all">
                    EXIT GAME
                </button>
            </div>
        </aside>

        <!-- Main Game Area -->
        <main class="flex-1 relative p-6 flex items-center justify-center">
            <!-- Decorative leaves -->
            <i data-lucide="leaf" class="leaf text-green-400 w-64 h-64 top-[-5%] left-[-5%] rotate-[15deg]"></i>
            <i data-lucide="leaf" class="leaf text-green-300 w-48 h-48 bottom-[-5%] right-[-5%] rotate-[160deg]"></i>

            <!-- Grid -->
            <div id="game-grid" class="grid grid-cols-5 gap-6 max-w-2xl w-full">
                <!-- Grid cells will be generated here -->
            </div>
        </main>

        <!-- Sidebar Right -->
        <aside class="glass-panel w-80 p-6 flex flex-col">
            <h2 class="text-2xl font-bold header-text mb-6 text-center">DESCRIPTION</h2>
            
            <div class="wood-inset flex-1 p-5 flex flex-col gap-4">
                <div class="text-sm leading-relaxed text-yellow-50/90 font-medium">
                    The shop <span class="text-yellow-400">vibra-style</span>: a lush sanctuary with vines and vibrant leaves. 
                    <br><br>
                    Includes sections for units, powers, and special items.
                </div>
                
                <div class="mt-4 flex flex-col gap-3">
                    <div class="flex justify-between items-center p-3 bg-white/5 rounded-xl border border-white/10">
                        <span class="stat-label">COST</span>
                        <span class="font-bold text-yellow-400">UST 60</span>
                    </div>
                    <div class="flex justify-between items-center p-3 bg-white/5 rounded-xl border border-white/10">
                        <span class="stat-label">RARITY</span>
                        <span class="font-bold text-purple-400">LEGENDARY</span>
                    </div>
                </div>

                <div class="mt-auto flex gap-2">
                    <div class="flex-1 h-12 bg-black/40 rounded-xl border border-white/10 flex items-center justify-center">
                         <i data-lucide="zap" class="w-5 h-5 text-yellow-500"></i>
                    </div>
                    <div class="flex-1 h-12 bg-black/40 rounded-xl border border-white/10 flex items-center justify-center">
                         <i data-lucide="shield" class="w-5 h-5 text-blue-500"></i>
                    </div>
                </div>
            </div>
            
            <button class="mt-6 nav-button py-4 text-xl tracking-wide" id="action-btn">
                PLAY MOVE
            </button>
        </aside>
    </div>

    <footer class="h-8 flex items-center justify-center gap-6 text-[11px] font-bold text-yellow-100/30 uppercase tracking-[0.2em] mt-2">
        <span>SESSION: ACTIVE</span>
        <span>MOK STUDIOS 2024</span>
    </footer>

    <script>
        lucide.createIcons();

        const gridContainer = document.getElementById('game-grid');
        const GRID_SIZE = 25; 
        let gridState = new Array(GRID_SIZE).fill(0);

        function createGrid() {
            gridContainer.innerHTML = '';
            for (let i = 0; i < GRID_SIZE; i++) {
                const cell = document.createElement('div');
                cell.className = 'grid-cell';
                cell.dataset.index = i;
                cell.onclick = () => handleCellClick(i);
                updateCellDisplay(cell, gridState[i]);
                gridContainer.appendChild(cell);
            }
        }

        function handleCellClick(index) {
            gridState[index] = (gridState[index] + 1) % 4;
            const cell = document.querySelector(`[data-index="${index}"]`);
            updateCellDisplay(cell, gridState[index]);
        }

        function updateCellDisplay(cell, count) {
            cell.innerHTML = ''; 
            if (count === 0) return;

            const dotContainer = document.createElement('div');
            dotContainer.className = 'flex flex-wrap justify-center items-center w-full h-full p-2 gap-2';
            
            for (let i = 0; i < count; i++) {
                const dot = document.createElement('div');
                dot.className = 'dot animate-pulse';
                dot.style.animationDuration = (1.2 + Math.random() * 0.8) + 's';
                dotContainer.appendChild(dot);
            }
            
            cell.appendChild(dotContainer);
        }

        window.onload = createGrid;

        document.getElementById('action-btn').addEventListener('click', () => {
            const btn = document.getElementById('action-btn');
            btn.classList.add('scale-95');
            setTimeout(() => btn.classList.remove('scale-95'), 100);
        });
    </script>
</body>
</html>
